name: Run ancestral climate pipeline

# ---------------------------------------------------------------------------
# MANUAL CLOUD EXECUTION ONLY.
# ---------------------------------------------------------------------------
# This workflow has no push, pull_request, or schedule trigger.
# Pushing commits only updates this workflow file; it does NOT run the
# ancestral climate models and does NOT create Result Block 1 outputs.
#
# To actually start cloud execution, dispatch workflow_dispatch from exactly one
# of these entry points:
#   1. GitHub Actions tab
#   2. gh workflow run run_ancestral_climate.yml
#   3. GitHub REST API workflow-dispatch endpoint
#
# Docs:
# https://docs.github.com/actions/how-tos/manage-workflow-runs/manually-run-a-workflow
# https://docs.github.com/actions/reference/workflows-and-actions/events-that-trigger-workflows#workflow_dispatch
on:
  # Manual-only trigger. Do not read a committed workflow file as evidence that
  # geiger::fitContinuous ran; a workflow_dispatch run must exist.
  workflow_dispatch:
    inputs:
      stage:
        description: "Pipeline stage to run manually. Production order: model_fit -> root_reconstruction -> pca_projection -> plot."
        required: true
        default: "model_fit"
        type: choice
        options:
          - model_fit
          - root_reconstruction
          - pca_projection
          - plot
      ncores:
        description: "Number of cores to expose to geiger::fitContinuous via GEIGER_NCORES."
        required: true
        default: "1"
        type: string
      model_fit_variable:
        description: "For stage=model_fit only: shard the fit stage to one variable, or use all for the final cached aggregation."
        required: true
        default: "all"
        type: choice
        options:
          - all
          - annual_mean_temperature
          - annual_precipitation
          - maximum_temperature_warmest_month
          - mean_temperature_coldest_quarter
          - mean_temperature_driest_quarter
          - minimum_temperature_coldest_month
          - precipitation_in_coldest_quarter
          - precipitation_of_coldest_quarter
          - precipitation_of_wettest_quarter
          - precipitation_wettest_month
          - temperature_annual_range
          - temperature_seasonality
      model_fit_model:
        description: "For stage=model_fit only: fit one candidate model for the selected variable, or all candidate models."
        required: true
        default: "all"
        type: choice
        options:
          - all
          - BM
          - OU
          - EB
          - lambda
          - delta
          - mean_trend
      use_fit_cache:
        description: "Restore/save the pipeline fitContinuous cache between cloud runs."
        required: true
        default: true
        type: boolean
      upload_results:
        description: "Upload stage outputs as a GitHub Actions artifact."
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCRIPT_FILE: scripts/run_ancestral_climate_reconstruction.R
  TREE_FILE: data/raw/pruned_phylogeny.nex
  CLIMATE_FILE: data/raw/climate.csv
  RESULT_DIR: results/result_block_1_strict_ancestral_climate
  FIT_CACHE_DIR: results/result_block_1_strict_ancestral_climate/cache
  FIT_CACHE_NAMESPACE: ancestral-fit-cache

jobs:
  run-ancestral-climate:
    name: Run strict ancestral climate pipeline (${{ inputs.stage }})
    runs-on: ubuntu-latest
    timeout-minutes: 1440

    steps:
      - name: "00 diagnostics: workflow dispatch context"
        shell: bash
        continue-on-error: false
        run: |
          set -euo pipefail
          echo "Workflow: ${GITHUB_WORKFLOW}"
          echo "Run ID: ${GITHUB_RUN_ID}"
          echo "Run attempt: ${GITHUB_RUN_ATTEMPT}"
          echo "Event: ${GITHUB_EVENT_NAME}"
          echo "Ref: ${GITHUB_REF}"
          echo "SHA: ${GITHUB_SHA}"
          echo "Selected stage: ${{ inputs.stage }}"
          echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=${FORCE_JAVASCRIPT_ACTIONS_TO_NODE24}"
          echo "Runner OS: ${RUNNER_OS}"
          echo "Runner arch: ${RUNNER_ARCH}"
          date -u +"Workflow diagnostics started at UTC: %Y-%m-%dT%H:%M:%SZ"

      - name: "01 checkout repository (actions/checkout@v6)"
        uses: actions/checkout@v6
        continue-on-error: false

      - name: "01 diagnostics: checkout result"
        shell: bash
        continue-on-error: false
        run: |
          set -euo pipefail
          echo "Checkout completed."
          echo "Workspace: ${GITHUB_WORKSPACE}"
          git status --short --branch
          git rev-parse --verify HEAD
          git log --oneline -1
          ls -la .github/workflows

      - name: "02 validate required production inputs (fail-fast)"
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking required production inputs before installing R packages or starting model runtime."
          missing=0
          required_paths=(
            "${SCRIPT_FILE}"
            "${TREE_FILE}"
            "${CLIMATE_FILE}"
          )

          for path in "${required_paths[@]}"; do
            if [[ ! -f "${path}" ]]; then
              echo "::error file=${path}::Cloud execution cannot start because required production input is missing: ${path}"
              missing=1
            else
              bytes="$(wc -c < "${path}" | tr -d '[:space:]')"
              echo "Found ${path} (${bytes} bytes)"
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            echo "::error::Cloud execution cannot start because required production inputs are missing."
            echo "Stopping before any expensive cloud setup or R model execution."
            exit 1
          fi

      - name: "03 resolve selected stage outputs and artifact name"
        id: stage
        continue-on-error: false
        shell: bash
        env:
          STAGE: ${{ inputs.stage }}
          MODEL_FIT_VARIABLE: ${{ inputs.model_fit_variable }}
          MODEL_FIT_MODEL: ${{ inputs.model_fit_model }}
        run: |
          set -euo pipefail

          safe_component() {
            printf "%s" "$1" | sed -E 's/[^A-Za-z0-9_]+/_/g; s/_+/_/g; s/^_//; s/_$//'
          }

          if [[ "${STAGE}" != "model_fit" && ( "${MODEL_FIT_VARIABLE}" != "all" || "${MODEL_FIT_MODEL}" != "all" ) ]]; then
            echo "::error::model_fit_variable/model_fit_model can only be used when stage=model_fit."
            exit 1
          fi

          if [[ "${MODEL_FIT_MODEL}" != "all" && "${MODEL_FIT_VARIABLE}" == "all" ]]; then
            echo "::error::model_fit_model=${MODEL_FIT_MODEL} requires model_fit_variable to name one climate variable, not 'all'."
            exit 1
          fi

          case "${STAGE}" in
            model_fit)
              if [[ "${MODEL_FIT_VARIABLE}" != "all" || "${MODEL_FIT_MODEL}" != "all" ]]; then
                key_output="${RESULT_DIR}/model_fit_shard_completion.txt"
                stage_note="model_fit shard fits or loads a bounded variable/model subset so GitHub's 6-hour job cap cannot be mistaken for completed full model fitting."
                required_outputs=(
                  "${RESULT_DIR}/model_fit_shard_attempts.csv"
                  "${RESULT_DIR}/model_fit_shard_completion.txt"
                )
                if [[ "${MODEL_FIT_VARIABLE}" != "all" ]]; then
                  safe_variable="$(safe_component "${MODEL_FIT_VARIABLE}")"
                  required_outputs+=("${FIT_CACHE_DIR}/${safe_variable}_fitContinuous_cache.rds")
                fi
                if [[ "${MODEL_FIT_MODEL}" == "all" ]]; then
                  required_outputs+=("${RESULT_DIR}/model_fit_shard_selection.csv")
                fi
                artifact_name="ancestral-climate-model-fit-shard-$(safe_component "${MODEL_FIT_VARIABLE}")-$(safe_component "${MODEL_FIT_MODEL}")"
              else
                key_output="${RESULT_DIR}/per_variable_model_selection_preliminary.csv"
                stage_note="model_fit final aggregation intentionally stops before root reconstruction; per_variable_model_fits.csv is not expected yet."
                required_outputs=(
                  "${RESULT_DIR}/per_variable_model_fit_attempts_detailed.csv"
                  "${RESULT_DIR}/per_variable_model_selection_preliminary.csv"
                )
                artifact_name="ancestral-climate-model-fit"
              fi
              ;;
            root_reconstruction)
              key_output="${RESULT_DIR}/ancestral_root_original_climate_strict.csv"
              stage_note="root_reconstruction writes primary root estimates in original climate variables."
              required_outputs=(
                "${RESULT_DIR}/per_variable_model_fits.csv"
                "${RESULT_DIR}/ancestral_root_original_climate_strict.csv"
                "${RESULT_DIR}/sensitivity_comparison_summary.csv"
                "${RESULT_DIR}/cross_variable_climate_coherence_diagnostics.csv"
                "${RESULT_DIR}/ancestral_root_vector_used_for_PCA_projection_strict.csv"
              )
              ;;
            pca_projection)
              key_output="${RESULT_DIR}/ancestral_root_projected_PCA_point_strict.csv"
              stage_note="pca_projection projects the original-variable root for visualization and diagnostics only."
              required_outputs=(
                "${RESULT_DIR}/ancestral_root_projected_PCA_point_strict.csv"
                "${RESULT_DIR}/ancestral_root_projected_PCA_ellipses_strict.csv"
                "${RESULT_DIR}/ancestral_root_interpretability_metrics.csv"
                "${RESULT_DIR}/biological_interpretation_summary.txt"
                "${RESULT_DIR}/result_block_1_strict_ancestral_climate_outputs.xlsx"
              )
              ;;
            plot)
              key_output="${RESULT_DIR}/ancestral_root_projected_PCA_strict_plot.png"
              stage_note="plot writes the final visualization after original-variable reconstruction and PCA projection."
              required_outputs=(
                "${RESULT_DIR}/ancestral_root_projected_PCA_strict_plot.png"
                "${RESULT_DIR}/ancestral_root_projected_PCA_strict_plot.pdf"
              )
              ;;
            *)
              echo "::error::Unsupported stage: ${STAGE}"
              exit 1
              ;;
          esac

          artifact_name="${artifact_name:-ancestral-climate-${STAGE//_/-}}"

          echo "key_output=${key_output}" >> "${GITHUB_OUTPUT}"
          echo "required_outputs=${required_outputs[*]}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

          echo "EXPECTED_KEY_OUTPUT=${key_output}" >> "${GITHUB_ENV}"
          echo "EXPECTED_STAGE_OUTPUTS=${required_outputs[*]}" >> "${GITHUB_ENV}"
          echo "EXPECTED_STAGE_NOTE=${stage_note}" >> "${GITHUB_ENV}"
          echo "EXPECTED_ARTIFACT_NAME=${artifact_name}" >> "${GITHUB_ENV}"

      - name: "04 pre-run execution summary"
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail

          echo "Manual dispatch summary"
          echo "This workflow is manual-only; pushes do not run it."
          echo "Required production stage order: model_fit -> root_reconstruction -> pca_projection -> plot"
          echo "Selected stage: ${{ inputs.stage }}"
          echo "GEIGER_NCORES: ${{ inputs.ncores }}"
          echo "Model-fit variable shard: ${{ inputs.model_fit_variable }}"
          echo "Model-fit candidate-model shard: ${{ inputs.model_fit_model }}"
          echo "Fit cache restore/save enabled: ${{ inputs.use_fit_cache }}"
          echo "Upload results: ${{ inputs.upload_results }}"
          echo "Scientific script: ${SCRIPT_FILE}"
          echo "Tree input: ${TREE_FILE}"
          echo "Climate input: ${CLIMATE_FILE}"
          echo "Result directory: ${RESULT_DIR}"
          echo "Fit cache directory: ${FIT_CACHE_DIR}"
          echo "Expected key output for selected stage: ${EXPECTED_KEY_OUTPUT}"
          echo "All expected outputs verified for selected stage:"
          read -r -a expected_outputs <<< "${EXPECTED_STAGE_OUTPUTS}"
          for path in "${expected_outputs[@]}"; do
            echo "  - ${path}"
          done
          echo "Stage note: ${EXPECTED_STAGE_NOTE}"
          echo "Artifact name if upload_results=true: ${EXPECTED_ARTIFACT_NAME}"

      - name: "05 install Linux system libraries for R packages"
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gfortran \
            make \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libfribidi-dev \
            libharfbuzz-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff5-dev \
            libglpk-dev \
            libgmp3-dev \
            libudunits2-dev \
            qpdf

      - name: "06 diagnostics: runner before setup-r"
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail
          echo "Runner OS: ${RUNNER_OS}"
          echo "Kernel:"
          uname -a
          echo "Disk space before R setup:"
          df -h
          echo "Memory before R setup:"
          if command -v free >/dev/null 2>&1; then
            free -h
          else
            echo "free command unavailable on this runner."
          fi
          echo "Node executable visible to shell:"
          command -v node || true
          node --version || true

      - name: "07 set up R (r-lib/actions/setup-r@v2)"
        uses: r-lib/actions/setup-r@v2
        continue-on-error: false
        with:
          r-version: "release"
          use-public-rspm: true

      - name: "07 diagnostics: R after setup-r"
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail
          echo "R executable:"
          command -v R
          R --version
          echo "Rscript executable:"
          command -v Rscript
          Rscript -e 'cat("R version string: ", R.version.string, "\n", sep = "")'
          Rscript -e 'cat("R library paths:\n"); print(.libPaths())'

      - name: "08 install/cache R package dependencies (r-lib/actions/setup-r-dependencies@v2)"
        uses: r-lib/actions/setup-r-dependencies@v2
        continue-on-error: false
        with:
          cache: true
          cache-version: result-block-1-r-packages-v1
          packages: |
            any::ape
            any::geiger
            any::phytools
            any::dplyr
            any::readr
            any::stringr
            any::ggplot2
            any::ggrepel
            any::tibble
            any::writexl
            any::scales
            any::Matrix
            any::sessioninfo

      - name: "08 diagnostics: R package dependency setup completed"
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail
          Rscript -e 'pkgs <- c("ape", "geiger", "phytools", "dplyr", "readr", "ggplot2"); print(installed.packages()[pkgs, c("Package", "Version"), drop = FALSE])'

      - name: "09 prepare result and fit cache directories"
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RESULT_DIR}" "${FIT_CACHE_DIR}"
          echo "Prepared result directory: ${RESULT_DIR}"
          echo "Prepared fit cache directory: ${FIT_CACHE_DIR}"

      - name: "10 restore fitContinuous cache (actions/cache/restore@v5)"
        id: restore-fit-cache
        if: ${{ inputs.use_fit_cache }}
        uses: actions/cache/restore@v5
        continue-on-error: false
        with:
          path: ${{ env.FIT_CACHE_DIR }}
          # This key is deliberately unique for this run. The restore key below
          # pulls the newest cache with the same script/data hash, and the save
          # step writes a fresh immutable cache after a successful run.
          # runner.os and hashFiles are used here, not in top-level env, because
          # runner context is available to steps but not to workflow-level env.
          key: ${{ env.FIT_CACHE_NAMESPACE }}-${{ runner.os }}-${{ hashFiles('scripts/run_ancestral_climate_reconstruction.R', 'data/raw/pruned_phylogeny.nex', 'data/raw/climate.csv') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ env.FIT_CACHE_NAMESPACE }}-${{ runner.os }}-${{ hashFiles('scripts/run_ancestral_climate_reconstruction.R', 'data/raw/pruned_phylogeny.nex', 'data/raw/climate.csv') }}-

      - name: "10 diagnostics: fit cache restore result"
        if: ${{ always() }}
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail

          matched_key="${{ steps.restore-fit-cache.outputs.cache-matched-key }}"
          exact_hit="${{ steps.restore-fit-cache.outputs.cache-hit }}"

          if [[ "${{ inputs.use_fit_cache }}" != "true" ]]; then
            echo "Fit cache restore disabled for this manual run."
          elif [[ -n "${matched_key}" ]]; then
            echo "Fit cache restored from key: ${matched_key}"
            echo "Exact primary-key cache hit reported by actions/cache: ${exact_hit:-unknown}"
          else
            echo "No previous fit cache was restored. This run is starting cold for fitContinuous cache files."
          fi

      - name: "11 write cloud run trace metadata"
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail

          matched_key="${{ steps.restore-fit-cache.outputs.cache-matched-key }}"
          exact_hit="${{ steps.restore-fit-cache.outputs.cache-hit }}"
          cache_restored="false"
          if [[ "${{ inputs.use_fit_cache }}" == "true" && -n "${matched_key}" ]]; then
            cache_restored="true"
          fi

          {
            echo "workflow_name=${GITHUB_WORKFLOW}"
            echo "workflow_run_id=${GITHUB_RUN_ID}"
            echo "workflow_run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "stage=${{ inputs.stage }}"
            echo "model_fit_variable=${{ inputs.model_fit_variable }}"
            echo "model_fit_model=${{ inputs.model_fit_model }}"
            echo "commit_sha=${GITHUB_SHA}"
            echo "git_ref=${GITHUB_REF}"
            date -u +"started_at_utc=%Y-%m-%dT%H:%M:%SZ"
            echo "fit_cache_requested=${{ inputs.use_fit_cache }}"
            echo "fit_cache_restored=${cache_restored}"
            echo "fit_cache_exact_hit=${exact_hit:-unknown}"
            echo "fit_cache_matched_key=${matched_key:-none}"
            echo "expected_key_output=${EXPECTED_KEY_OUTPUT}"
            echo "artifact_name=${EXPECTED_ARTIFACT_NAME}"
          } > "${RESULT_DIR}/cloud_run_trace.txt"

      - name: "12 diagnostics: runner resources before R stage"
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail
          echo "Runner OS: ${RUNNER_OS}"
          echo "Runner arch: ${RUNNER_ARCH}"
          echo "Kernel:"
          uname -a
          echo "Disk space before R stage:"
          df -h
          echo "Memory before R stage:"
          if command -v free >/dev/null 2>&1; then
            free -h
          else
            echo "free command unavailable on this runner."
          fi
          echo "Node visible to shell:"
          command -v node || true
          node --version || true
          echo "R version after setup-r:"
          R --version
          Rscript -e 'cat("R version string: ", R.version.string, "\n", sep = "")'

      - name: "13 run selected R pipeline stage (${{ inputs.stage }})"
        continue-on-error: false
        shell: bash
        env:
          GEIGER_NCORES: ${{ inputs.ncores }}
          RESUME_MODEL_CACHE: ${{ inputs.use_fit_cache }}
          SAVE_INTERMEDIATE_RDS: "true"
          OUTPUT_DIR: ${{ env.RESULT_DIR }}
          MODEL_FIT_VARIABLE: ${{ inputs.model_fit_variable }}
          MODEL_FIT_MODEL: ${{ inputs.model_fit_model }}
        run: |
          set -euo pipefail

          cache_args=()
          if [[ "${{ inputs.use_fit_cache }}" != "true" ]]; then
            cache_args+=(--no-resume-model-cache)
          fi

          echo "Running strict ancestral climate script..."
          echo "Expected key output after R returns: ${EXPECTED_KEY_OUTPUT}"
          Rscript "${SCRIPT_FILE}" \
            --stage="${{ inputs.stage }}" \
            --model-fit-variable="${{ inputs.model_fit_variable }}" \
            --model-fit-model="${{ inputs.model_fit_model }}" \
            "${cache_args[@]}"

      - name: "14 verify selected stage outputs"
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail

          echo "Verifying outputs for stage '${{ inputs.stage }}'."
          echo "${EXPECTED_STAGE_NOTE}"
          read -r -a required_outputs <<< "${EXPECTED_STAGE_OUTPUTS}"

          missing=0
          for path in "${required_outputs[@]}"; do
            if [[ ! -s "${path}" ]]; then
              echo "::error file=${path}::Expected output for stage '${{ inputs.stage }}' was not produced or is empty: ${path}"
              missing=1
            else
              bytes="$(wc -c < "${path}" | tr -d '[:space:]')"
              echo "Verified ${path} (${bytes} bytes)"
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            echo "Selected stage did not produce all expected outputs."
            exit 1
          fi

          {
            date -u +"verified_at_utc=%Y-%m-%dT%H:%M:%SZ"
            echo "verified_stage=${{ inputs.stage }}"
            echo "verified_expected_key_output=${EXPECTED_KEY_OUTPUT}"
          } >> "${RESULT_DIR}/cloud_run_trace.txt"

          echo "Stage completion verified: stage=${{ inputs.stage }}"
          echo "Expected key output verified: ${EXPECTED_KEY_OUTPUT}"
          echo "Artifact name requested for upload: ${EXPECTED_ARTIFACT_NAME}"

      - name: "15 always list top-level result files"
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -d "${RESULT_DIR}" ]]; then
            echo "Result directory does not exist yet: ${RESULT_DIR}"
            exit 0
          fi

          echo "Top-level files currently present in ${RESULT_DIR}:"
          find "${RESULT_DIR}" -maxdepth 1 -type f -printf "%f\n" | sort || true

      - name: "16 failure/cancellation diagnostics: partial outputs"
        if: ${{ failure() || cancelled() }}
        shell: bash
        run: |
          set -uo pipefail
          echo "Workflow reached failure/cancellation diagnostics."
          echo "Result directory: ${RESULT_DIR}"
          if [[ -d "${RESULT_DIR}" ]]; then
            echo "Top-level result directory entries:"
            find "${RESULT_DIR}" -maxdepth 1 -printf "%M %s %p\n" | sort || true
            echo "Partial result files:"
            find "${RESULT_DIR}" -maxdepth 2 -type f -printf "%s bytes  %p\n" | sort || true
          else
            echo "Result directory does not exist."
          fi
          echo "Fit cache directory: ${FIT_CACHE_DIR}"
          if [[ -d "${FIT_CACHE_DIR}" ]]; then
            echo "Fit cache directory entries:"
            find "${FIT_CACHE_DIR}" -maxdepth 2 -printf "%M %s %p\n" | sort || true
          else
            echo "Fit cache directory does not exist."
          fi

      - name: "17 save fitContinuous cache (actions/cache/save@v5)"
        if: ${{ success() && inputs.use_fit_cache }}
        uses: actions/cache/save@v5
        continue-on-error: false
        with:
          path: ${{ env.FIT_CACHE_DIR }}
          key: ${{ env.FIT_CACHE_NAMESPACE }}-${{ runner.os }}-${{ hashFiles('scripts/run_ancestral_climate_reconstruction.R', 'data/raw/pruned_phylogeny.nex', 'data/raw/climate.csv') }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: "18 upload stage results artifact (actions/upload-artifact@v7)"
        if: ${{ always() && inputs.upload_results }}
        uses: actions/upload-artifact@v7
        continue-on-error: false
        with:
          name: ${{ steps.stage.outputs.artifact_name }}
          path: |
            results/result_block_1_strict_ancestral_climate/**
            !results/result_block_1_strict_ancestral_climate/cache/**
          if-no-files-found: warn
          retention-days: 30

      - name: "19 report completed stage"
        if: ${{ success() }}
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail

          echo "Completed stage: ${{ inputs.stage }}"
          echo "Verified expected output: ${EXPECTED_KEY_OUTPUT}"
          if [[ "${{ inputs.upload_results }}" == "true" ]]; then
            echo "Uploaded artifact: ${EXPECTED_ARTIFACT_NAME}"
          else
            echo "Artifact upload was disabled for this run."
          fi
